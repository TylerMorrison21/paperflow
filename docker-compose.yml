services:
  paperflow:
    image: ${PAPERFLOW_IMAGE:-ghcr.io/tylermorrison21/paperflow:latest}
    container_name: paperflow
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data/jobs
      CORS_ORIGINS: "*"
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      MARKER_API_URL: ${MARKER_API_URL:-https://www.datalab.to/api/v1/marker}
      DAILY_SUBMISSION_LIMIT: ${DAILY_SUBMISSION_LIMIT:-300}
      MONTHLY_PAGE_LIMIT: ${MONTHLY_PAGE_LIMIT:-8000}
      PER_EMAIL_DAILY_LIMIT: ${PER_EMAIL_DAILY_LIMIT:-3}
      PER_USER_TRIAL_PAGE_LIMIT: ${PER_USER_TRIAL_PAGE_LIMIT:-100}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-15}
      MAX_PAGES: ${MAX_PAGES:-15}
    volumes:
      - ./data:/data
    restart: unless-stopped
